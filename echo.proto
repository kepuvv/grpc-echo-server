syntax = "proto3";

package echo;

option go_package = "grpc-echo-server/echo";

service EchoService {
  rpc Echo(EchoRequest) returns (EchoResponse);
  rpc SayHello(HelloRequest) returns (HelloResponse);
}

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
}

message HelloRequest {
  string name = 1;
}

message HelloResponse {
  string message = 1;
}

